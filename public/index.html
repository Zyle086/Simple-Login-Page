<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="parent-container">
        
        <div class="login-form form-container">
            <div class="top">
                <div class="header step1">
                    <h1>Welcome Back!</h1>
                    <h3>Want to continue where you left off ?</h3>
                </div>
                <div class="input-container">
                    <input class="step2" type="text" placeholder="Username or Email" id="login-username">
                    <div class="password-container step2">
                        <img src="assets/svg/eye-closed.png" alt="" id="login">
                        <input type="password" placeholder="Password" id="login-password">
                    </div>
                    <div class="form-options step2">
                        <div class="remember-container">
                            <input type="checkbox">
                            <h4>Remember Me</h4>
                        </div>
                            <h4><a href="#">Forgot Password</a></h4>
                        </div>
                        <button id="login-btn" class="submit step2">Login</button>
                </div>
                <div class="divider step3">
                    <span><h3>or continue with</h3></span>
                </div>
                <div class="icons-container step3">
                    <ul id="icons">
                        <li class="icon google"><a href="#"><i class="fa-brands fa-google"></i></a></li>
                        <li class="icon apple"><a href="#"><i class="fa-brands fa-apple"></i></a></li>
                        <li class="icon facebook"><a href="#"><i class="fa-brands fa-facebook"></i></a></li>
                    </ul>
                </div>
            </div>
            <div class="bottom step4"><h4>New Here? <a id="to-register">Create An Account</a></h4></div>
            
        </div>

        <div class="register-form form-container hidden">
            <div class="top">
                <div class="header step1">
                    <h1>Welcome Aboard!</h1>
                    <h3>Let's get you all set up.</h3>
                </div>
                <div class="input-container">
                    <input class="step1" type="text" placeholder="Username or Email" id="register-username">
                    <div class="password-container step1" id="reg-password">
                        <img src="assets/svg/eye-closed.png" alt="" id="register">
                        <input type="password" placeholder="Password" id="register-password">
                    </div>
                    <div class="password-container step1">
                        <img src="assets/svg/eye-closed.png" alt="" id="confirm">
                        <input type="password" placeholder="Confirm Password" id="confirm-password">
                    </div>
                    
                    <button id="register-btn" class="submit step2">Register</button>
                    
        
                    <button id="brand-register-btn" class="step2"><img class="brand-svg" src="assets/svg/icons-google.svg" alt="">Continue with Google</button>
                    <button id="brand-register-btn" class="step2"><img class="brand-svg" src="assets/svg/icons-apple.svg" alt="">Continue with Apple</button>
                    <button id="brand-register-btn" class="step2"><img class="brand-svg" src="assets/svg/icons-facebook.svg" alt="">Continue with Facebook</button>

                   
                   
                </div>
            </div>
            <div class="bottom step4"> 
                <h4>Already have an account? <a id="to-login">Log in</a></h4>
            </div>
        </div>

        <div class="img-container right">
            <img src="assets/LoginImg.jpg" alt="">
        </div>

    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
