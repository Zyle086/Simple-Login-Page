<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
    <title>Login Page</title>
</head>
<body>
     
    <div id="parent-container">
        <div class="container main-container">
            <h1>Welcome Back!</h1>
            <h3>Want to continue where you left off ?</h3>
            <input type="text" placeholder="Username">
            <input type="text" placeholder="Password">
            <h3><a href="#">Forgot Password</a></h3>
            <Button id="login-btn">Login</Button>
            <h3><span>or continue with</span></h3>
            
            <ui id="icons">
                <li class="icon google"><a href="#"><i class="fa-brands fa-google"></i></a></li>
                <li class="icon apple"><a href="#"><i class="fa-brands fa-apple"></i></a></li>
                <li class="icon facebook"><a href="#"><i class="fa-brands fa-facebook"></i></a></li>
            </ui>

        </div>

        <div class="container">
            <img src="assets/LoginImg.jpg" alt="gren">
        </div>
    </div>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
