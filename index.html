<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="web-page/style.css">
    <title>Login Page</title>
</head>
<body>
     
    <div class="parent-container container">
        <div class="container login-container" >
            <div class="intro-text-container container">
                <h1>Welcome Back!</h1>
                <h3>Want to continue where you left off ?</h3>
            </div>
            <div class="input-container container">
                <input type="text" placeholder="Username">
                <input type="text" placeholder="Password">
            </div>
            <h3 id= "forgot-pass"><a href="#">Forgot Password</a></h3>
            <button id="login-btn" type="button">Login</button>
            <div class="divider">
                <span><h3>or continue with</h3></span>
            </div>
            
            <ul id="icons">
                <li class="icon google"><a href="#"><i class="fa-brands fa-google"></i></a></li>
                <li class="icon apple"><a href="#"><i class="fa-brands fa-apple"></i></a></li>
                <li class="icon facebook"><a href="#"><i class="fa-brands fa-facebook"></i></a></li>
            </ul>

            <h3 class="footer">New here? <a href="#">Create an account</a></h3>
        </div>

        <div class="container signup-container form-container"> 
     
            <div class="intro-text-container container">
                <h1>Welcome Aboard!</h1>
                <h3>Let's get you all set up.</h3>
            </div>
            <div class="input-name-container container">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">
            <button class="brand-signup-btn"><img src="assets/svg/icons-google.svg" alt="">Continue with Google</button>
            <button class="brand-signup-btn"><img src="assets/svg/icons-apple.svg" alt="">Continue with Apple</button>
            <button class="brand-signup-btn"><img src="assets/svg/icons-facebook.svg" alt="">Continue with Facebook</button>
            <h3 class="footer" >Already have an account? <a href="#">Log in</a></h3>
        </div>

        <div class="img-container container">
            <img id= "Login-img" src="assets/LoginImg.jpg" alt="gren">
        </div>

    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="web-page/script.js"></script>
</body>
</html>
